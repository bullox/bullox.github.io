<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">

    <head>
        <link href="http://gmpg.org/xfn/11" rel="profile">
        <meta http-equiv="content-type" content="text/html; charset=utf-8">

        <!-- Enable responsiveness on mobile devices-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

        <title>
          {% if page.title == "Home" %}
            {{ site.title }} &middot; {{ site.tagline }}
          {% else %}
            {{ page.title }} &middot; {{ site.title }}
          {% endif %}
        </title>

        <!-- CSS -->
        <link rel="stylesheet" href="{{ ASSET_PATH }}/css/poole.css">
        <link rel="stylesheet" href="{{ ASSET_PATH }}/css/syntax.css">
        <link rel="stylesheet" href="{{ ASSET_PATH }}/css/hyde.css">
        <link href='http://fonts.googleapis.com/css?family=Raleway:400,300' rel='stylesheet' type='text/css'>
        <link href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">
        
        <!-- Icons -->
        <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ ASSET_PATH }}/apple-touch-icon-144-precomposed.png">
        <link rel="shortcut icon" href="{{ ASSET_PATH }}/favicon.ico">

        <!-- RSS -->
        <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">

    </head>

    <body>

      {% include themes/hyde/sidebar.html %}

    <div class="content container">
      {{ content }}
    </div>
    {% include JB/analytics %}
  </body>
</html>
